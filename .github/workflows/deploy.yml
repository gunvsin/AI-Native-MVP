name: Deploy to Google Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: 'auth'
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: 'projects/511017089544/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-runner@ai-finance-mvp.iam.gserviceaccount.com'

      - name: Build and Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v1'
        with:
          service: 'my-backend-api'
          region: 'us-central1'
          source: '.'

  deploy-frontend:
    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: 'auth'
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: 'projects/511017089544/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-runner@ai-finance-mvp.iam.gserviceaccount.com'
      
      # This build step might need to be adjusted if your frontend code is not in the root
      # or if it uses a different build command.
      - name: Build Frontend
        run: npm install && npm run build
        
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          projectId: 'ai-finance-mvp'
          # By authenticating with the 'auth' step above, 
          # we no longer need to provide a service account key here.
