
name: Deploy to Google Cloud and Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'YOUR_WIF_PROVIDER'
          service_account: 'YOUR_SERVICE_ACCOUNT'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build -t us-central1-docker.pkg.dev/YOUR_PROJECT_ID/my-app-backend:latest .
          docker push us-central1-docker.pkg.dev/YOUR_PROJECT_ID/my-app-backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy my-backend-service \
            --image us-central1-docker.pkg.dev/YOUR_PROJECT_ID/my-app-backend:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'YOUR_WIF_PROVIDER'
          service_account: 'YOUR_SERVICE_ACCOUNT'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        run: npm install && npm run build

      - name: Deploy to Firebase Hosting
        uses: firebase-tools/action-hosting-deploy@v0
        with:
          projectId: 'YOUR_PROJECT_ID'
          channelId: live
          target: your-firebase-hosting-target # Optional: specify a target if you have multiple sites
